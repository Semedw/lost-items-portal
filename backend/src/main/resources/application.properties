app.db.name=${DB_NAME:lost_items}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${app.db.name}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASS:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

auth.jwt.secret=${AUTH_JWT_SECRET:replace-this-with-a-very-long-secret-key-for-jwt-signing-please-change}
auth.jwt.access-token-expiration-seconds=${AUTH_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
auth.refresh-token.expiration-seconds=${AUTH_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
auth.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:false}
auth.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
