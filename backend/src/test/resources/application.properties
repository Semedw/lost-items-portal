spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
auth.jwt.secret=test-jwt-secret-key-that-is-long-enough-for-hmac
auth.jwt.access-token-expiration-seconds=900
auth.refresh-token.expiration-seconds=1209600
auth.refresh-cookie.secure=false
auth.refresh-cookie.same-site=Lax
