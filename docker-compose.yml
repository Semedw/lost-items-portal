services:
  db:
    image: postgres:latest
    container_name: lost_item_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"

  backend:
    build: ./backend
    container_name: lost_item_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:${DB_PORT:-5432}/${DB_NAME}}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-replace-this-with-a-very-long-secret-key-for-jwt-signing-please-change}
      AUTH_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${AUTH_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-900}
      AUTH_REFRESH_TOKEN_EXPIRATION_SECONDS: ${AUTH_REFRESH_TOKEN_EXPIRATION_SECONDS:-1209600}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-false}
      AUTH_REFRESH_COOKIE_SAME_SITE: ${AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: lost_item_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
